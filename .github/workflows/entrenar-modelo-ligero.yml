name: Entrenar Modelo Ligero

on:
  push:

jobs:
  train-and-upload-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ipykernel

      - name: Ejecutar procesamiento de datos
        run: |
          python - <<'PY'
          import os
          from procesar_datos import ejecutar_procesamiento

          raw_dir = os.path.join("outputs", "raw")
          archivo_tiff = os.path.join(raw_dir, "sevilla_dataset.tif")
          archivo_arbolado = os.path.join(raw_dir, "arbolado_sevilla.csv")
          archivo_carreteras = os.path.join(raw_dir, "carreteras_sevilla.csv")

          ejecutar_procesamiento(
              archivo_local_tiff=archivo_tiff,
              arbolado_csv=archivo_arbolado,
              carreteras_csv=archivo_carreteras,
          )
          PY

      - name: Ejecutar notebook de entrenamiento ligero
        run: |
          python -m nbconvert \
            --to notebook \
            --execute entrenamiento_modelo_ligero.ipynb \
            --output entrenamiento_modelo_ligero.executed.ipynb \
            --ExecutePreprocessor.timeout=3600 \
            --ExecutePreprocessor.allow_errors=True

      - name: Verificar modelo generado
        run: |
          test -f models/xgboost_sevilla_temperatura_v1.pkl

      - name: Subir modelo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: modelo-xgboost-sevilla
          path: models/xgboost_sevilla_temperatura_v1.pkl

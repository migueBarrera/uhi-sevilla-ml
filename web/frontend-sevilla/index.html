<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-sevilla</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Firebase Hosting Analytics: place this script at the end of the body -->
    <script defer src="/__/firebase/9.22.2/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/9.22.2/firebase-analytics-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function waitForFirebaseAnalytics() {
        var maxRetries = 100;
        var delay = 200; // ms
        function tryInit(retriesLeft) {
          if (window.firebase && typeof firebase.analytics === 'function' && firebase.apps && firebase.apps.length) {
            try { firebase.analytics(); } catch (e) { /* silent */ }
            return;
          }
          if (retriesLeft <= 0) {
            console.warn('Firebase Analytics not initialized.');
            return;
          }
          setTimeout(function() { tryInit(retriesLeft - 1); }, delay);
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          tryInit(maxRetries);
        } else {
          document.addEventListener('DOMContentLoaded', function() { tryInit(maxRetries); });
        }
      })();
    </script>
  </body>
</html>
